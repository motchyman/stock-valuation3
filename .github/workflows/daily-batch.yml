name: Daily Stock Batch

on:
  schedule:
    # 毎日 JST 1:00 = UTC 16:00（前日）
    - cron: "0 16 * * *"
  workflow_dispatch: {}  # 手動実行も可能にする

jobs:
  batch:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Run full batch
        run: |
          BASE="https://stock-valuation3.vercel.app"
          FROM=0
          SIZE=3

          while :; do
            echo "=== from=$FROM ==="
            RES=$(curl -s -m 30 "$BASE/api/batch?from=$FROM&size=$SIZE")

            # JSONとして妥当か確認
            if ! echo "$RES" | jq -e . >/dev/null 2>&1; then
              echo "不正なレスポンス。30秒後にリトライ: $RES"
              sleep 30
              continue
            fi

            SUCCESS=$(echo "$RES" | jq -r '.success // 0')
            ERRORS=$(echo "$RES" | jq -r '.errors // 0')
            NEXT=$(echo "$RES" | jq -r '.nextFrom')
            NEXTURL=$(echo "$RES" | jq -r '.nextUrl')

            echo "成功:$SUCCESS エラー:$ERRORS"

            if [ "$NEXTURL" = "null" ]; then
              echo "全件完了！"
              break
            fi

            FROM=$NEXT
            sleep 2
          done
