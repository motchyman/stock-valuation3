name: Daily Stock Batch

on:
  schedule:
    # 毎日 JST 1:00 = UTC 16:00（前日）
    - cron: "0 16 * * *"
  workflow_dispatch: {}

jobs:
  batch:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Run full batch
        run: |
          BASE="https://stock-valuation3.vercel.app"
          FROM=0
          SIZE=3
          PRICE_FAIL_CODES=""

          while :; do
            echo "=== from=$FROM ==="
            RES=$(curl -s -m 60 "$BASE/api/batch?from=$FROM&size=$SIZE" || echo "")

            if ! echo "$RES" | jq -e . >/dev/null 2>&1; then
              echo "不正なレスポンス。30秒後にリトライ: $RES"
              sleep 30
              continue
            fi

            SUCCESS=$(echo "$RES" | jq -r '.success // 0')
            ERRORS=$(echo "$RES" | jq -r '.errors // 0')
            NEXT=$(echo "$RES" | jq -r '.nextFrom')
            NEXTURL=$(echo "$RES" | jq -r '.nextUrl')

            # 価格取得失敗した銘柄コードを蓄積
            FAIL_CODES=$(echo "$RES" | jq -r '.priceFailures[]?.code // empty' | tr '\n' ',' | sed 's/,$//')
            if [ -n "$FAIL_CODES" ]; then
              if [ -z "$PRICE_FAIL_CODES" ]; then
                PRICE_FAIL_CODES="$FAIL_CODES"
              else
                PRICE_FAIL_CODES="$PRICE_FAIL_CODES,$FAIL_CODES"
              fi
            fi

            echo "成功:$SUCCESS エラー:$ERRORS"

            if [ "$NEXTURL" = "null" ]; then
              echo "全件完了！"
              break
            fi

            FROM=$NEXT
            sleep 2
          done

          # 価格取得失敗した銘柄を再実行
          if [ -n "$PRICE_FAIL_CODES" ]; then
            echo "=== 価格取得失敗銘柄を再実行: $PRICE_FAIL_CODES ==="
            sleep 10
            RETRY_RES=$(curl -s -m 120 "$BASE/api/batch?codes=$PRICE_FAIL_CODES" || echo "")
            if echo "$RETRY_RES" | jq -e . >/dev/null 2>&1; then
              RETRY_SUCCESS=$(echo "$RETRY_RES" | jq -r '.success // 0')
              RETRY_FAIL=$(echo "$RETRY_RES" | jq -r '.priceFailCount // 0')
              echo "再実行結果: 成功=$RETRY_SUCCESS 価格失敗=$RETRY_FAIL"
              if [ "$RETRY_FAIL" != "0" ]; then
                STILL_FAIL=$(echo "$RETRY_RES" | jq -r '.priceFailures[]?.code // empty' | tr '\n' ',')
                echo "まだ価格取得できていない銘柄: $STILL_FAIL"
              fi
            else
              echo "再実行レスポンス異常: $RETRY_RES"
            fi
          else
            echo "価格取得失敗なし"
          fi
