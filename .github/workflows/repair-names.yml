name: Repair Stock Names

on:
  workflow_dispatch: {}

jobs:
  repair-names:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Run name repair batch
        env:
          JQUANTS_API_KEY: ${{ secrets.JQUANTS_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          node << 'EOF'
          const https = require('https');

          const JQ_KEY = process.env.JQUANTS_API_KEY;
          const SB_URL = process.env.SUPABASE_URL;
          const SB_KEY = process.env.SUPABASE_ANON_KEY;
          const JQ_BASE = 'https://api.jquants.com/v2';

          const fetch = (url, opts = {}) => new Promise((resolve, reject) => {
            const u = new URL(url);
            const req = https.request({
              hostname: u.hostname, path: u.pathname + u.search,
              method: opts.method || 'GET',
              headers: opts.headers || {},
              timeout: opts.timeout || 30000,
            }, res => {
              let data = [];
              res.on('data', c => data.push(c));
              res.on('end', () => resolve({
                ok: res.statusCode < 300,
                status: res.statusCode,
                text: () => Promise.resolve(Buffer.concat(data).toString()),
                json: () => Promise.resolve(JSON.parse(Buffer.concat(data).toString())),
              }));
            });
            req.on('error', reject);
            req.on('timeout', () => { req.destroy(); reject(new Error('timeout')); });
            if (opts.body) req.write(opts.body);
            req.end();
          });

          const sleep = ms => new Promise(r => setTimeout(r, ms));

          function getRecentBusinessDay(daysAgo) {
            const d = new Date();
            let count = 0;
            while (count < daysAgo) {
              d.setDate(d.getDate() - 1);
              if (d.getDay() !== 0 && d.getDay() !== 6) count++;
            }
            return d.toISOString().slice(0, 10).replace(/-/g, '');
          }

          (async () => {
            // ── デバッグ: まず1日分だけ試してレスポンスを確認 ──────────
            const date = getRecentBusinessDay(1);
            console.log(`テスト: date=${date}`);
            const url = `${JQ_BASE}/equities/master?date=${date}`;
            console.log(`URL: ${url}`);

            const res = await fetch(url, { headers: { 'x-api-key': JQ_KEY } });
            console.log(`HTTPステータス: ${res.status}`);

            const body = await res.text();
            console.log(`レスポンス（先頭500文字）: ${body.slice(0, 500)}`);

            // ── Supabaseのname欠損件数だけ確認 ──────────────────────────
            const sbUrl = `${SB_URL}/rest/v1/stocks?select=code&or=(name.is.null,name.eq.)&order=code.asc&limit=5`;
            const sbRes = await fetch(sbUrl, {
              headers: { apikey: SB_KEY, Authorization: `Bearer ${SB_KEY}` }
            });
            console.log(`Supabase HTTPステータス: ${sbRes.status}`);
            const sbBody = await sbRes.text();
            console.log(`Supabase レスポンス（先頭200文字）: ${sbBody.slice(0, 200)}`);
          })();
          EOF
