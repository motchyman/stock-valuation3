name: EDINET Init Batch

on:
  workflow_dispatch: {}
  schedule:
    - cron: "0 17 * * *"

jobs:
  edinet-init:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - name: Install dependencies
        run: npm install jszip

      - name: Run EDINET batch (date-based)
        env:
          EDINET_API_KEY: ${{ secrets.EDINET_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          node << 'EOF'
          const https = require('https');

          const EDINET_KEY = process.env.EDINET_API_KEY;
          const SB_URL = process.env.SUPABASE_URL;
          const SB_KEY = process.env.SUPABASE_ANON_KEY;

          const fetch = (url, opts = {}) => new Promise((resolve, reject) => {
            const u = new URL(url);
            const req = https.request({
              hostname: u.hostname, path: u.pathname + u.search,
              method: opts.method || 'GET',
              headers: opts.headers || {},
              timeout: opts.timeout || 30000,
            }, res => {
              let data = [];
              res.on('data', c => data.push(c));
              res.on('end', () => resolve({
                ok: res.statusCode < 300,
                status: res.statusCode,
                json: () => Promise.resolve(JSON.parse(Buffer.concat(data).toString())),
                arrayBuffer: () => Promise.resolve(Buffer.concat(data).buffer),
              }));
            });
            req.on('error', reject);
            req.on('timeout', () => { req.destroy(); reject(new Error('timeout')); });
            if (opts.body) req.write(opts.body);
            req.end();
          });

          const sleep = ms => new Promise(r => setTimeout(r, ms));

          // ── 内訳タグ・フォールバック実装の反映のため、全銘柄を再処理対象とする ──
          async function getPendingCodes() {
            const url = `${SB_URL}/rest/v1/stocks?select=code&order=code.asc&limit=5000`;
            const res = await fetch(url, {
              headers: { apikey: SB_KEY, Authorization: `Bearer ${SB_KEY}` }
            });
            if (!res.ok) return new Set();
            const data = await res.json();
            return new Set(data.map(d => d.code));
          }

          async function getDocsForDate(dateStr) {
            try {
              const res = await fetch(
                `https://api.edinet-fsa.go.jp/api/v2/documents.json?date=${dateStr}&type=2&Subscription-Key=${EDINET_KEY}`,
                { timeout: 15000 }
              );
              if (!res.ok) return [];
              const data = await res.json();
              return data.results || [];
            } catch { return []; }
          }

          // ── XBRLタグ定義 ──────────────────────────────────────────────
          const IBD_TAGS = [
            'ShortTermLoansPayable', 'CurrentPortionOfLongTermLoansPayable',
            'ShortTermBondsPayable', 'BondsPayable', 'LongTermLoansPayable',
            'BorrowingsCurrent', 'BorrowingsNoncurrent',
          ];

          // 棚卸資産: 合計タグ優先、なければ内訳を合算
          const INVENTORY_TOTAL_TAGS = ['Inventories'];
          const INVENTORY_BREAKDOWN_TAGS = [
            'MerchandiseAndFinishedGoods', 'Merchandise', 'FinishedGoods',
            'WorkInProcess', 'RawMaterialsAndSupplies', 'RawMaterials', 'Supplies',
          ];

          // 有形固定資産: 合計タグ優先、なければ内訳を合算
          const PPE_TOTAL_TAGS = ['PropertyPlantAndEquipment'];
          const PPE_BREAKDOWN_TAGS = [
            'BuildingsAndStructures', 'MachineryEquipmentAndVehicles',
            'Land', 'ConstructionInProgress', 'ToolsFurnitureAndFixtures',
            'OtherPropertyPlantAndEquipment',
          ];

          // 売上債権
          const RECEIVABLE_TAGS = [
            'NotesAndAccountsReceivableTrade',
            'NotesAndAccountsReceivableTradeAndContractAssets',
            'AccountsReceivableTrade',
          ];

          // 無形固定資産
          const INTANGIBLE_TAGS = ['IntangibleAssets'];

          // 営業負債: 仕入債務・前受金・未払費用
          const OP_LIAB_TAGS = [
            'NotesAndAccountsPayableTrade',
            'AccountsPayableTrade',
            'AdvancesReceived',
            'AccruedExpenses',
          ];

          function extractTagValue(xbrl, tag, contexts) {
            const re = new RegExp(`<[^:]+:${tag}[^>]*contextRef="([^"]*)"[^>]*>\\s*([\\d.]+)\\s*</[^:]+:${tag}>`, 'g');
            let best = null, bestPri = 999, m;
            while ((m = re.exec(xbrl)) !== null) {
              const pri = contexts.findIndex(c => m[1].includes(c));
              const val = parseFloat(m[2]);
              if (val > 0 && pri < bestPri) { best = val; bestPri = pri; }
            }
            return best;
          }

          function extractTagSum(xbrl, tags, contexts) {
            let total = 0;
            const seen = new Set();
            for (const tag of tags) {
              if (seen.has(tag)) continue;
              const val = extractTagValue(xbrl, tag, contexts);
              if (val !== null) { total += val; seen.add(tag); }
            }
            return total;
          }

          // 合計タグ優先、見つからなければ内訳タグを合算するフォールバック付き抽出
          function extractWithFallback(xbrl, totalTags, breakdownTags, contexts) {
            const totalVal = extractTagSum(xbrl, totalTags, contexts);
            if (totalVal > 0) return totalVal;
            return extractTagSum(xbrl, breakdownTags, contexts);
          }

          async function getBalanceSheetData(docId) {
            try {
              const JSZip = require('jszip');
              const res = await fetch(
                `https://api.edinet-fsa.go.jp/api/v2/documents/${docId}?type=1&Subscription-Key=${EDINET_KEY}`,
                { timeout: 25000 }
              );
              if (!res.ok) return null;
              const buf = await res.arrayBuffer();
              const zip = await JSZip.loadAsync(Buffer.from(buf));
              let xbrl = '';
              for (const [name, file] of Object.entries(zip.files)) {
                if (name.includes('PublicDoc/') && name.endsWith('.xbrl') && !name.match(/lab|cal|def|pre|_ref/)) {
                  xbrl = await file.async('string');
                  if (xbrl.length > 1000) break;
                }
              }
              if (!xbrl) return null;

              const CONTEXTS = ['ConsolidatedMember', 'CurrentYearInstant', 'FilingDateInstant'];

              const ibd = extractTagSum(xbrl, IBD_TAGS, CONTEXTS);

              const inventory   = extractWithFallback(xbrl, INVENTORY_TOTAL_TAGS, INVENTORY_BREAKDOWN_TAGS, CONTEXTS);
              const ppe         = extractWithFallback(xbrl, PPE_TOTAL_TAGS, PPE_BREAKDOWN_TAGS, CONTEXTS);
              const receivable  = extractTagSum(xbrl, RECEIVABLE_TAGS, CONTEXTS);
              const intangible  = extractTagSum(xbrl, INTANGIBLE_TAGS, CONTEXTS);

              const opAsset = inventory + ppe + receivable + intangible;
              const opLiab  = extractTagSum(xbrl, OP_LIAB_TAGS, CONTEXTS);

              return { ibd, opAsset, opLiab };
            } catch { return null; }
          }

          async function save(code, ibdRaw, edinetCode, opAssetRaw, opLiabRaw) {
            await fetch(`${SB_URL}/rest/v1/stocks?code=eq.${code}`, {
              method: 'PATCH',
              headers: {
                apikey: SB_KEY, Authorization: `Bearer ${SB_KEY}`,
                'Content-Type': 'application/json', Prefer: 'return=minimal',
              },
              body: JSON.stringify({
                ibd_raw: ibdRaw,
                edinet_code: edinetCode,
                op_assets_raw: opAssetRaw,
                op_liab_raw: opLiabRaw,
              }),
            });
          }

          (async () => {
            const pending = await getPendingCodes();
            console.log(`再処理対象銘柄数: ${pending.size}`);
            if (pending.size === 0) {
              console.log('完了！処理対象なし');
              return;
            }

            let totalOk = 0;
            const today = new Date();
            const deadline = Date.now() + (340 * 60 * 1000);

            for (let d = 0; d < 400 && pending.size > 0; d++) {
              if (Date.now() > deadline) {
                console.log('時間切れのため終了します。続きは次回実行で処理されます。');
                break;
              }

              const dt = new Date(today);
              dt.setDate(dt.getDate() - d);
              const dateStr = dt.toISOString().split('T')[0];

              const docs = await getDocsForDate(dateStr);
              if (docs.length === 0) { await sleep(150); continue; }

              const matches = docs.filter(doc =>
                doc.docTypeCode === '120' &&
                doc.xbrlFlag === '1' &&
                doc.withdrawalStatus === '0' &&
                doc.disclosureStatus === '0' &&
                doc.secCode &&
                pending.has(doc.secCode.slice(0, 4))
              );

              if (matches.length > 0) {
                console.log(`--- ${dateStr}: ${matches.length}件の対象書類を発見 ---`);
              }

              for (const doc of matches) {
                const code4 = doc.secCode.slice(0, 4);
                if (!pending.has(code4)) continue;
                try {
                  const bs = await getBalanceSheetData(doc.docID);
                  if (!bs) {
                    await save(code4, -1, '', -1, -1);
                    pending.delete(code4);
                    console.log(`${code4}: BS取得失敗 -1マーク`);
                  } else {
                    await save(code4, bs.ibd, doc.edinetCode, bs.opAsset, bs.opLiab);
                    pending.delete(code4);
                    totalOk++;
                    console.log(`${code4}: 営業資産${Math.round(bs.opAsset/100000000)}億 営業負債${Math.round(bs.opLiab/100000000)}億 ✅ (残り${pending.size})`);
                  }
                } catch (e) {
                  console.log(`${code4}: エラー ${e.message}`);
                }
                await sleep(800);
              }

              await sleep(150);
            }

            if (pending.size > 0) {
              console.log(`=== 残り${pending.size}銘柄は未処理のため次回実行で継続します ===`);
            }

            console.log(`完了！取得成功:${totalOk}件`);
          })();
          EOF
