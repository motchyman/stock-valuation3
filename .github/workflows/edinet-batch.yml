name: EDINET Init Batch

on:
  workflow_dispatch: {}
  schedule:
    - cron: "0 17 * * *"

jobs:
  edinet-init:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - name: Install dependencies
        run: npm install jszip

      - name: Run EDINET batch (date-based)
        env:
          EDINET_API_KEY: ${{ secrets.EDINET_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          node << 'EOF'
          const https = require('https');

          const EDINET_KEY = process.env.EDINET_API_KEY;
          const SB_URL = process.env.SUPABASE_URL;
          const SB_KEY = process.env.SUPABASE_ANON_KEY;

          const fetch = (url, opts = {}) => new Promise((resolve, reject) => {
            const u = new URL(url);
            const req = https.request({
              hostname: u.hostname, path: u.pathname + u.search,
              method: opts.method || 'GET',
              headers: opts.headers || {},
              timeout: opts.timeout || 30000,
            }, res => {
              let data = [];
              res.on('data', c => data.push(c));
              res.on('end', () => resolve({
                ok: res.statusCode < 300,
                status: res.statusCode,
                json: () => Promise.resolve(JSON.parse(Buffer.concat(data).toString())),
                arrayBuffer: () => Promise.resolve(Buffer.concat(data).buffer),
              }));
            });
            req.on('error', reject);
            req.on('timeout', () => { req.destroy(); reject(new Error('timeout')); });
            if (opts.body) req.write(opts.body);
            req.end();
          });

          const sleep = ms => new Promise(r => setTimeout(r, ms));

          // Supabaseの全銘柄コード（4桁）をSetで取得（ibd_rawがまだNULLのもの）
          async function getPendingCodes() {
            const url = `${SB_URL}/rest/v1/stocks?select=code&ibd_raw=is.null&order=code.asc&limit=5000`;
            const res = await fetch(url, {
              headers: { apikey: SB_KEY, Authorization: `Bearer ${SB_KEY}` }
            });
            if (!res.ok) return new Set();
            const data = await res.json();
            return new Set(data.map(d => d.code));
          }

          // 指定日の書類一覧を取得
          async function getDocsForDate(dateStr) {
            try {
              const res = await fetch(
                `https://api.edinet-fsa.go.jp/api/v2/documents.json?date=${dateStr}&type=2&Subscription-Key=${EDINET_KEY}`,
                { timeout: 15000 }
              );
              if (!res.ok) return [];
              const data = await res.json();
              return data.results || [];
            } catch { return []; }
          }

          async function getIBD(docId) {
            const TAGS = [
              'ShortTermLoansPayable','CurrentPortionOfLongTermLoansPayable',
              'ShortTermBondsPayable','BondsPayable','LongTermLoansPayable',
              'BorrowingsCurrent','BorrowingsNoncurrent',
            ];
            try {
              const JSZip = require('jszip');
              const res = await fetch(
                `https://api.edinet-fsa.go.jp/api/v2/documents/${docId}?type=1&Subscription-Key=${EDINET_KEY}`,
                { timeout: 25000 }
              );
              if (!res.ok) return 0;
              const buf = await res.arrayBuffer();
              const zip = await JSZip.loadAsync(Buffer.from(buf));
              let xbrl = '';
              for (const [name, file] of Object.entries(zip.files)) {
                if (name.includes('PublicDoc/') && name.endsWith('.xbrl') && !name.match(/lab|cal|def|pre|_ref/)) {
                  xbrl = await file.async('string');
                  if (xbrl.length > 1000) break;
                }
              }
              if (!xbrl) return 0;
              const CONTEXTS = ['ConsolidatedMember','CurrentYearInstant','FilingDateInstant'];
              let total = 0;
              const seen = new Set();
              for (const tag of TAGS) {
                if (seen.has(tag)) continue;
                const re = new RegExp(`<[^:]+:${tag}[^>]*contextRef="([^"]*)"[^>]*>\\s*([\\d.]+)\\s*</[^:]+:${tag}>`, 'g');
                let best = null, bestPri = 999, m;
                while ((m = re.exec(xbrl)) !== null) {
                  const pri = CONTEXTS.findIndex(c => m[1].includes(c));
                  const val = parseFloat(m[2]);
                  if (val > 0 && pri < bestPri) { best = val; bestPri = pri; }
                }
                if (best !== null) { total += best; seen.add(tag); }
              }
              return total;
            } catch { return 0; }
          }

          async function save(code, ibdRaw, edinetCode) {
            await fetch(`${SB_URL}/rest/v1/stocks?code=eq.${code}`, {
              method: 'PATCH',
              headers: {
                apikey: SB_KEY, Authorization: `Bearer ${SB_KEY}`,
                'Content-Type': 'application/json', Prefer: 'return=minimal',
              },
              body: JSON.stringify({ ibd_raw: ibdRaw, edinet_code: edinetCode }),
            });
          }

          (async () => {
            const pending = await getPendingCodes();
            console.log(`未処理銘柄数: ${pending.size}`);
            if (pending.size === 0) {
              console.log('完了！処理対象なし');
              return;
            }

            let totalOk = 0, totalDocsFound = 0;
            const today = new Date();
            const deadline = Date.now() + (340 * 60 * 1000); // 340分でタイムアウト前に切り上げ

            // 直近400日を1日ずつ遡る（土日もEDINETは200を返すのでスキップしない）
            for (let d = 0; d < 400 && pending.size > 0; d++) {
              if (Date.now() > deadline) {
                console.log('時間切れのため終了します。続きは次回実行で処理されます。');
                break;
              }

              const dt = new Date(today);
              dt.setDate(dt.getDate() - d);
              const dateStr = dt.toISOString().split('T')[0];

              const docs = await getDocsForDate(dateStr);
              if (docs.length === 0) { await sleep(150); continue; }

              // この日の有報(120)のうち、未処理銘柄に該当するものだけ処理
              const matches = docs.filter(doc =>
                doc.docTypeCode === '120' &&
                doc.xbrlFlag === '1' &&
                doc.withdrawalStatus === '0' &&
                doc.disclosureStatus === '0' &&
                doc.secCode &&
                pending.has(doc.secCode.slice(0, 4))
              );

              if (matches.length > 0) {
                console.log(`--- ${dateStr}: ${matches.length}件の対象書類を発見 ---`);
              }

              for (const doc of matches) {
                const code4 = doc.secCode.slice(0, 4);
                if (!pending.has(code4)) continue; // 同日内の重複対策
                try {
                  const ibd = await getIBD(doc.docID);
                  await save(code4, ibd, doc.edinetCode);
                  pending.delete(code4);
                  totalOk++;
                  totalDocsFound++;
                  console.log(`${code4}: ${Math.round(ibd/100000000)}億円 ✅ (残り${pending.size})`);
                } catch (e) {
                  console.log(`${code4}: エラー ${e.message}`);
                }
                await sleep(800);
              }

              await sleep(150);
            }

            // 400日探しても見つからなかった銘柄は -1 でマーク（有報なし扱い）
            if (pending.size > 0) {
              console.log(`=== 残り${pending.size}銘柄は有報未発見のため -1 でマーク ===`);
              for (const code of pending) {
                await save(code, -1, '');
                await sleep(200);
              }
            }

            console.log(`完了！取得成功:${totalOk}件`);
          })();
          EOF
